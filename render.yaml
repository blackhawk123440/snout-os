services:
  # PostgreSQL Database
  - type: pg
    name: snout-os-db
    plan: starter
    databaseName: snout_os
    user: snoutos

  # Web Service (Next.js — handles UI + API routes)
  - type: web
    name: snout-os-web
    env: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm prisma generate && pnpm run build
    startCommand: npx prisma migrate deploy && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        fromService:
          name: snout-os-web
          type: web
          property: host
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_ENABLE_MESSAGING_V1
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: snout-os-db
          property: connectionString
      - key: STRIPE_MOCK_TRANSFER
        value: "false"
    healthCheckPath: /api/health

  # Background worker (calendar sync, payouts, automations, etc.)
  # Must run same commit as web for calendar/booking consistency. Deploy with web.
  - type: worker
    name: snout-os-worker
    env: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm prisma generate && pnpm run build
    startCommand: pnpm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: snout-os-db
          property: connectionString
      - key: NEXT_PUBLIC_GIT_SHA
        fromService:
          name: snout-os-web
          type: web
          property: commitSha
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
